<article class="rounded-[10px] border border-slate-200 bg-white p-4 shadow-sm">
  <h3 class="mb-1 text-base font-semibold text-slate-900">{{ student().fullName }}</h3>
  <p class="mb-3 wrap-break-words text-sm text-slate-500">{{ student().email }}</p>
  <a
    class="text-sm font-medium text-[#0f2740] no-underline hover:underline"
    [routerLink]="['/students', student().studentId]"
    >Ver ficha</a
  >
</article>
