@if (enrollments().length === 0) {
  <p class="empty">No hay inscripciones activas.</p>
} @else {
  <ul class="list">
    @for (e of enrollments(); track e.enrollmentId) {
      @if (e.isActive) {
        <li class="row">
          <div class="info">
            <span class="subject">{{ e.subjectName }}</span>
            <span class="sub">{{ e.credits }} créd. · {{ e.professorName }}</span>
          </div>
          <div class="actions">
            <a
              class="link"
              [routerLink]="['/students', studentId(), 'classmates', e.subjectId]"
              >Compañeros</a
            >
            <button type="button" class="btn-danger" (click)="onCancel(e)">Cancelar</button>
          </div>
        </li>
      }
    }
  </ul>
}
