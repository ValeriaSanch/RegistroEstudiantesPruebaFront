<a
  routerLink="/students"
  class="mb-4 inline-block text-sm font-medium text-[#0f2740] no-underline hover:underline"
  >← Volver al listado</a
>

@if (error()) {
  <app-error-alert [message]="error()!" (dismissed)="error.set(null)" />
}

@if (loading()) {
  <app-loading-state message="Cargando estudiante…" />
} @else {
  @let st = student();
  @if (st) {
    <header class="mb-5 flex flex-wrap items-start justify-between gap-4">
      <div>
        <h2 class="mb-1.5 text-2xl font-semibold text-slate-900">{{ st.fullName }}</h2>
        <p class="m-0 text-sm text-slate-600">
          Créditos totales (inscripciones activas): <strong class="font-semibold text-slate-800">{{ st.totalCredits }}</strong> · Estado:
          <strong class="font-semibold text-slate-800">{{ st.isActive ? 'Activo' : 'Inactivo' }}</strong>
        </p>
      </div>
      <button
        type="button"
        class="rounded-lg border border-red-200 bg-white px-3.5 py-2 text-sm font-semibold text-red-700 shadow-sm hover:bg-red-50 disabled:cursor-not-allowed disabled:opacity-55"
        [disabled]="blocking()"
        (click)="onDelete()"
      >
        Eliminar estudiante
      </button>
    </header>

    <section class="grid grid-cols-1 items-start gap-5 lg:grid-cols-[minmax(280px,420px)_1fr]">
      <app-student-edit-form [student]="st" (saved)="onUpdate($event)" />

      <div class="flex flex-col gap-4">
        <div>
          <h3 class="mb-2 text-base font-semibold text-slate-900">Inscripciones</h3>
          <app-enrollment-list
            [studentId]="st.studentId"
            [enrollments]="st.enrollments"
            (cancelRequest)="onCancelEnrollment($event)"
          />
        </div>
        <app-enroll-subject-form
          [subjects]="subjects()"
          [enrolledSubjectIds]="enrolledSubjectIds()"
          (enroll)="onEnroll($event)"
        />
        @if (blocking()) {
          <p class="m-0 text-sm text-slate-500">Procesando…</p>
        }
      </div>
    </section>
  }
}
