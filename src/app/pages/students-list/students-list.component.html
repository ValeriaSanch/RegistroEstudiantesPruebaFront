<h2 class="mb-4 text-xl font-semibold text-slate-900">Estudiantes</h2>

@if (error()) {
  <app-error-alert [message]="error()!" (dismissed)="error.set(null)" />
}

<div class="grid grid-cols-1 items-start gap-5 lg:grid-cols-[minmax(280px,380px)_1fr]">
  <div class="flex flex-col gap-2">
    <app-student-register-form (submitted)="onRegister($event)" />
    @if (saving()) {
      <p class="m-0 text-sm text-slate-500">Guardando…</p>
    }
  </div>
  <div>
    @if (loading()) {
      <app-loading-state />
    } @else if (students()?.length === 0) {
      <p class="m-0 text-sm text-slate-500">No hay estudiantes registrados.</p>
    } @else {
      <ul class="m-0 grid list-none grid-cols-[repeat(auto-fill,minmax(240px,1fr))] gap-3.5 p-0">
        @for (s of students()!; track s.studentId) {
          <li>
            <app-student-summary-card [student]="s" />
          </li>
        }
      </ul>
    }
  </div>
</div>
